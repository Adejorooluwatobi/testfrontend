<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Programs — AWEDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/style.css?v=2.1.6">
</head>
<body>
    <div id="toast-container"></div>
    <div id="header-placeholder"></div>

    <main class="page-wrap">
    <div class="main-content">
      <section class="section" style="background:linear-gradient(135deg,#1e5c3a,#c0522a);padding:80px 5% 60px;">
        <div class="section-inner" style="text-align:center;">
          <div id="prog-banner-header" style="font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.7);margin-bottom:10px;">Loading...</div>
          <h1 id="prog-banner-title" style="font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,52px);font-weight:900;color:#fff;margin-bottom:14px;">...</h1>
          <p id="prog-banner-desc" style="font-size:16px;color:rgba(255,255,255,.75);max-width:520px;margin:0 auto;line-height:1.7;">...</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div class="programs-grid" id="programs-full-grid">
            <!-- Populated by assets/js/programs.js -->
          </div>
        </div>
      </section>
    </div>

    <!-- PROGRAM DETAIL MODAL -->
    <div id="program-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-close" onclick="closeProgramModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"></path></svg>
            </div>
            <div id="modal-banner" class="modal-banner-img">
                <!-- Icon or Image -->
            </div>
            <div class="modal-info-scroll">
                <div class="modal-info">
                    <span id="modal-tag" class="modal-tag">Category</span>
                    <h2 id="modal-title" class="modal-title">Program Title</h2>
                    <div id="modal-desc" class="modal-full-desc">
                        <!-- Full Description -->
                    </div>
                    <div id="modal-stats-wrap" class="modal-stats">
                        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                            <span style="font-size:13px;font-weight:600;color:var(--text);">Current Progress</span>
                            <span id="modal-progress-text" style="font-size:14px;font-weight:700;color:var(--accent);">0%</span>
                        </div>
                        <div style="background:var(--surface);border-radius:20px;height:10px;overflow:hidden;border:1px solid var(--border);">
                            <div id="modal-progress-bar" style="width:0%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:20px;transition:width 0.6s ease;"></div>
                        </div>
                    <div id="modal-reach" style="margin-top:15px;font-size:13px;color:var(--muted);font-weight:500;">
                        <!-- Reaching info -->
                    </div>

                    <!-- GALLERY SECTION -->
                    <div id="modal-gallery-wrap" class="modal-gallery-wrap" style="display:none; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border);">
                        <h4 class="modal-gallery-title" style="font-size: 13px; font-weight: 700; color: var(--text); text-transform: uppercase; margin-bottom: 15px;">Image Gallery</h4>
                        <div id="modal-gallery" class="modal-gallery">
                            <!-- Thumbnails -->
                        </div>
                    </div>
                </div>
                <div style="margin-top:35px; padding: 0 40px 40px; display:flex; flex-direction: column; gap:12px;">
                    <div style="display:flex; gap:12px;">
                        <a href="donate.html" class="btn-accent" style="flex:1; text-align:center; padding:14px; text-decoration:none;">Support This Program</a>
                        <a id="modal-view-page" href="#" class="btn-view-page" style="flex:1;">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"></path></svg>
                            View Full Page
                        </a>
                    </div>
                    <button class="btn-ol" style="width:100%; padding:14px;" onclick="closeProgramModal()">Back to Programs</button>
                </div>
            </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    </main>

    <script src="assets/js/config.js?v=2.1.6"></script>
    <script src="assets/js/dummy-data.js?v=2.1.6"></script>
    <script src="assets/js/script.js?v=2.1.6"></script>
    <script src="assets/js/programs.js?v=2.1.6"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadIncludes === 'function') loadIncludes();
            if (typeof initPrograms === 'function') initPrograms();
        });
    </script>
</body>
</html>
