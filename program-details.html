<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Details — AWEDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/style.css?v=2.1.6">
    <style>
        .prog-hero { height: 50vh; min-height: 400px; display: flex; align-items: center; justify-content: center; position: relative; color: #fff; text-align: center; }
        .prog-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)); }
        .prog-header-wrap { max-width: 900px; margin: -60px auto 40px; padding: 40px; background: var(--surface); border-radius: 24px; position: relative; z-index: 10; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .detail-body { max-width: 800px; margin: 0 auto 80px; font-size: 18px; line-height: 1.8; color: var(--text); }
        .detail-body p { margin-bottom: 24px; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="header-placeholder"></div>

    <main class="page-wrap">
        <section id="prog-hero" class="prog-hero" style="background-color: var(--accent);">
            <div class="prog-hero-overlay"></div>
            <div style="position:relative; z-index:2;">
                <span id="prog-tag" class="prog-tag" style="background:var(--accent); color:#fff; border:none; margin-bottom:20px; display:inline-block;">Loading...</span>
                <h1 id="prog-title" style="font-family:'Playfair Display',serif; font-size:clamp(32px, 5vw, 60px); font-weight:900;">...</h1>
            </div>
        </section>

        <div class="prog-header-wrap">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;">
                <div style="flex:1; min-width:300px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span style="font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase;">Impact Progress</span>
                        <span id="prog-reach-text" style="font-size:14px; font-weight:700; color:var(--accent);">Reaching ...</span>
                    </div>
                    <div style="background:var(--surface2); border-radius:20px; height:10px; overflow:hidden;">
                        <div id="prog-progress-bar" style="width:0%; height:100%; background:linear-gradient(90deg, var(--accent), var(--accent3)); border-radius:20px; transition:width 1s ease;"></div>
                    </div>
                </div>
                <div style="display:flex; gap:12px;">
                    <a href="donate.html" class="btn-accent" style="padding:14px 28px; text-decoration:none;">Support Program</a>
                    <a href="volunteer.html" class="btn-ol" style="padding:14px 28px; text-decoration:none;">Volunteer</a>
                </div>
            </div>
        </div>

        <article class="detail-body" id="prog-desc">
            <!-- Content -->
        </article>

        <div id="footer-placeholder"></div>
    </main>

    <script src="assets/js/config.js?v=2.1.16"></script>
    <script src="assets/js/dummy-data.js?v=2.1.16"></script>
    <script src="assets/js/script.js?v=2.1.16"></script>
    <script src="assets/js/program-details.js?v=2.1.16"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadIncludes === 'function') loadIncludes();
        });
    </script>
</body>
</html>
